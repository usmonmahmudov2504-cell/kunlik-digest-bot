services:
  - type: worker
    name: discussion-ai-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python discussion_bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false        # Render dashboard dan qo'shiladi (secret)
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
