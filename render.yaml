services:
  - type: web
    name: discussion-ai-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python discussion_bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
