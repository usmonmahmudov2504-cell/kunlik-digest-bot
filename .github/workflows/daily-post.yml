name: Kunlik digest post

on:
  # Ishga tushirish TASHQI trigger (cron-job.org) orqali -> workflow_dispatch.
  # GitHub'ning ichki cron'i ishonchsiz (kechikadi/o'tkazib yuboradi) bo'lgani uchun
  # olib tashlandi. cron-job.org har 15 daqiqa AUTO rejimini chaqiradi; bot vaqtiga
  # qarab kunlik postlar + tezkor xabarni o'zi hal qiladi.
  workflow_dispatch:
    inputs:
      group:
        description: "Guruh: all, AUTO, A-D, M, F(o'yinlar), R(natijalar), S(jadval), G(gollar)"
        default: "all"

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # tezkor/kunlik holatni (state/) repoga commit qilish uchun
    concurrency:
      group: digest-post       # ishlar bir-birining ustiga chiqmasin (holat to'qnashuvi yo'q)
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip                 # tez-tez ishga tushishda pip'ni tezlashtiradi (gol-kuzatuvchi)

      - run: pip install -r requirements.txt

      # Qaysi rejim: jadval (heartbeat) -> AUTO; qo'lda -> tanlangan guruh
      - name: Rejimni aniqlash
        id: grp
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "group=AUTO" >> "$GITHUB_OUTPUT"
          else
            echo "group=${{ github.event.inputs.group || 'all' }}" >> "$GITHUB_OUTPUT"
          fi

      - run: python daily_digest_bot.py
        env:
          POST_GROUP: ${{ steps.grp.outputs.group }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          # Qo'lda (workflow_dispatch) ishga tushirilsa -> vaqt darvozasini chetlab o'tamiz
          # (test qulay bo'lsin). Jadval (schedule/AUTO) -> bo'sh, darvoza ishlaydi.
          FORCE_POST: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}

      # Holatni (tezkor dedup + kunlik belgilar) repoga saqlash (faqat o'zgargan bo'lsa).
      # MUHIM: main oldinga ketgan bo'lsa (boshqa commit) oddiy push RAD etiladi va holat
      # yo'qoladi -> keyingi run TAKROR postlaydi. Shuning uchun rebase + qayta urinish.
      - name: Holatni saqlash
        if: always()
        run: |
          if [ -z "$(git status --porcelain state/)" ]; then
            echo "Holatda o'zgarish yo'q."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/
          git commit -m "chore: post holati [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Holat saqlandi (urinish $i)."
              exit 0
            fi
            echo "Push rad etildi -> rebase qilib qayta urinaman ($i)..."
            git pull --rebase --autostash origin main || true
          done
          echo "XATO: holatni 5 urinishda ham saqlab bo'lmadi."
          exit 1
